<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>CONTACTO | JC</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { "body": ["Inter"], "headline": ["Inter"] },
        colors: {
          "background": "#f9f9f9",
          "on-background": "#1a1c1c",
          "surface-container": "#eeeeee",
          "surface-container-low": "#f3f3f4",
          "outline": "#777777",
          "outline-variant": "#c6c6c6",
          "primary": "#000000",
          "on-primary": "#e2e2e2",
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    font-size: 20px;
  }
</style>
</head>
<body class="bg-background font-body text-on-background antialiased min-h-screen flex flex-col">

<!-- Minimal Nav -->
<nav class="w-full px-6 py-6 flex justify-between items-center">
  <a href="index.html" class="text-sm font-bold tracking-tighter text-zinc-900 hover:opacity-70 transition-opacity">← Portafolio</a>
</nav>

<!-- Main Content -->
<main class="flex-1 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-lg">

    <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">Contacto</h1>
    <p class="text-sm text-zinc-500 tracking-wide mb-12">¿Tienes un proyecto en mente? Escríbeme y hablemos.</p>

    <!-- Contact Info -->
    <div class="flex flex-col gap-4 mb-12">
      <div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low border border-zinc-100">
        <span class="material-symbols-outlined text-zinc-400">mail</span>
        <div>
          <p class="text-[10px] uppercase tracking-widest text-zinc-400 mb-1">Email</p>
          <a href="mailto:hola@jeremycampos.com" class="text-sm font-medium text-zinc-900 hover:opacity-70 transition-opacity">hola@jeremycampos.com</a>
        </div>
      </div>
      <div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low border border-zinc-100">
        <span class="material-symbols-outlined text-zinc-400">phone</span>
        <div>
          <p class="text-[10px] uppercase tracking-widest text-zinc-400 mb-1">Teléfono</p>
          <a href="tel:+525512345678" class="text-sm font-medium text-zinc-900 hover:opacity-70 transition-opacity">+52 55 1234 5678</a>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <form id="contact-form" class="space-y-6">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Nombre</label>
        <input type="text" required class="w-full bg-transparent border-0 border-b border-zinc-200 focus:ring-0 focus:border-black transition-colors py-2 text-sm placeholder:text-zinc-300" placeholder="Tu nombre">
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Email</label>
        <input type="email" required class="w-full bg-transparent border-0 border-b border-zinc-200 focus:ring-0 focus:border-black transition-colors py-2 text-sm placeholder:text-zinc-300" placeholder="tu@email.com">
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 mb-2">Mensaje</label>
        <textarea required rows="4" class="w-full bg-transparent border-0 border-b border-zinc-200 focus:ring-0 focus:border-black transition-colors py-2 text-sm placeholder:text-zinc-300 resize-none" placeholder="Cuéntame sobre tu proyecto..."></textarea>
      </div>
      <button type="submit" class="w-full py-3 bg-black text-white text-[11px] uppercase tracking-widest font-bold hover:opacity-80 transition-opacity active:scale-[0.98]">
        Enviar Mensaje
      </button>
      <p id="form-status" class="text-xs text-center text-zinc-400 hidden"></p>
    </form>

  </div>
</main>

<!-- Footer -->
<footer class="w-full py-8 flex justify-center px-8">
  <span class="font-sans text-[10px] tracking-widest uppercase text-zinc-400">© 2026 Jeremy Campos</span>
</footer>

<script>
  document.getElementById('contact-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const status = document.getElementById('form-status');
    const form = e.target;
    // Build mailto link as simple fallback
    const name = form.querySelector('input[type="text"]').value;
    const email = form.querySelector('input[type="email"]').value;
    const message = form.querySelector('textarea').value;
    const subject = encodeURIComponent(`Nuevo contacto de ${name}`);
    const body = encodeURIComponent(`Nombre: ${name}\nEmail: ${email}\n\n${message}`);
    window.location.href = `mailto:hola@jeremycampos.com?subject=${subject}&body=${body}`;
    status.textContent = 'Abriendo tu cliente de correo...';
    status.classList.remove('hidden');
    status.classList.add('text-green-600');
  });
</script>

</body>
</html>
