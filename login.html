<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login | Monograph Archive</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "background": "#f9f9f9",
                  "on-background": "#1a1c1c",
                  "primary": "#000000",
                  "on-primary": "#e2e2e2",
                  "outline-variant": "#c6c6c6"
                },
                fontFamily: {
                  "sans": ["Inter", "sans-serif"],
                  "serif": ["Playfair Display", "serif"]
                }
              }
            }
          }
    </script>
</head>
<body class="bg-background font-sans text-on-background antialiased flex items-center justify-center min-h-screen selection:bg-primary selection:text-on-primary p-6">

    <div class="w-full max-w-md bg-white p-12 md:p-16 shadow-2xl rounded-sm flex flex-col items-center border border-zinc-100 relative overflow-hidden">
        <!-- Subtle decorative element -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-zinc-50 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-zinc-50 rounded-full blur-3xl opacity-50"></div>
        
        <h1 class="text-[10px] uppercase tracking-[0.3em] font-bold text-zinc-400 mb-8 relative z-10 w-full text-center">Gallery Admin</h1>
        <h2 class="text-4xl font-serif text-zinc-900 mb-2 font-normal text-center relative z-10 tracking-tight">Sign In</h2>
        <p class="text-xs text-zinc-500 mb-12 text-center max-w-xs leading-relaxed relative z-10">Access the editorial curation dashboard.</p>
        
        <button id="google-login-btn" class="relative z-10 w-full flex items-center justify-center gap-4 bg-white border border-outline-variant hover:bg-zinc-50 transition-colors py-4 px-6 hover:scale-[0.99] active:scale-[0.97] transition-transform duration-200">
            <svg class="h-4 w-4" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span class="text-[11px] font-bold uppercase tracking-widest text-zinc-900">Continue with Google</span>
        </button>

        <div class="w-full text-center mt-12 relative z-10 flex flex-col items-center gap-4">
            <div class="w-8 h-[1px] bg-zinc-200"></div>
            <a href="index.html" class="text-[9px] uppercase tracking-[0.2em] text-zinc-400 hover:text-zinc-900 transition-colors">Return to Archive</a>
        </div>
    </div>
</body>
<script type="module">
    import { auth, provider, signInWithPopup, onAuthStateChanged } from './firebase-config.js';

    // Auto-redirect if already logged in
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.replace('admin.html');
        }
    });

    const loginBtn = document.getElementById('google-login-btn');
    loginBtn.addEventListener('click', async () => {
        const originalText = loginBtn.innerHTML;
        loginBtn.innerHTML = '<span class="text-[11px] font-bold uppercase tracking-widest text-zinc-400">Authenticating...</span>';
        
        try {
            await signInWithPopup(auth, provider);
            // The onAuthStateChanged listener will handle the redirect
        } catch (error) {
            console.error("Login failed", error);
            alert("Acceso denegado. Asegúrate de configurar localhost en Firebase Dominios Autorizados.");
            loginBtn.innerHTML = originalText;
        }
    });
</script>
</html>
