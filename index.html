<script>
(function() {
  const video = document.getElementById('hero-video');
  const canvas = document.getElementById('hero-canvas');
  const ctx = canvas.getContext('2d');
  const hero = document.querySelector('section');
  
  let targetTime = 0, smoothTime = 0;
  let isHovering = false, isMobile = false;
  let seeking = false, ready = false;

  // Draw current video frame to canvas
  function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  }

  video.addEventListener('loadeddata', () => {
    ready = true;
    const mid = video.duration / 2;
    video.currentTime = mid;
    smoothTime = mid;
    targetTime = mid;
  });

  video.addEventListener('seeked', () => {
    seeking = false;
    drawFrame();
  });

  // Detect mobile
  isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  // Desktop: mouse controls timeline
  hero.addEventListener('mousemove', (e) => {
    if (isMobile || !ready) return;
    isHovering = true;
    const rect = hero.getBoundingClientRect();
    const nx = (e.clientX - rect.left) / rect.width;
    targetTime = Math.max(0.01, nx * video.duration);
  });

  hero.addEventListener('mouseleave', () => {
    isHovering = false;
    if (ready) targetTime = video.duration / 2;
  });

  // Main animation loop
  function loop() {
    requestAnimationFrame(loop);
    if (!ready) return;

    if (isMobile) {
      // Mobile: gentle auto oscillation
      const t = performance.now() * 0.0004;
      const target = (Math.sin(t) * 0.5 + 0.5) * video.duration;
      smoothTime += (target - smoothTime) * 0.05;
    } else {
      // Desktop: lerp toward cursor target
      smoothTime += (targetTime - smoothTime) * 0.07;
    }

    const seekTo = Math.max(0, Math.min(smoothTime, video.duration - 0.01));
    
    if (!seeking && Math.abs(video.currentTime - seekTo) > 0.02) {
      seeking = true;
      video.currentTime = seekTo;
    }
  }

  loop();
})();
