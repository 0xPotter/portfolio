              "surface-container-low": "#f3f3f4",

<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; font-size: 18px; }
</style>
</head>
<body class="bg-background font-body text-on-background antialiased selection:bg-primary selection:text-on-primary">

<!-- Navigation -->
<nav class="fixed top-0 w-full z-50 bg-white/70 dark:bg-zinc-950/70 backdrop-blur-xl flex justify-between items-center px-6 py-4 border-b border-surface-variant/50">
    <a href="index.html" class="flex items-center gap-2 text-[11px] uppercase tracking-[0.15em] font-bold text-zinc-900 transition-opacity hover:opacity-60">
        <span class="material-symbols-outlined text-[16px]">arrow_back</span> Retornar
    </a>
</nav>

<!-- Content Container -->
<main id="project-container" class="pt-32 pb-32 min-h-screen opacity-0 transition-opacity duration-1000 ease-out">
    <!-- Header Area -->
    <header class="max-w-4xl mx-auto px-6 mb-20 text-center">
        <p id="proj-category" class="font-sans text-[11px] tracking-[0.4em] uppercase text-zinc-500 mb-6 font-semibold"></p>
        <h1 id="proj-title" class="text-5xl md:text-7xl font-sans font-black tracking-tighter text-primary leading-tight mb-8"></h1>
        <p id="proj-narrative" class="text-lg md:text-xl text-on-surface-variant font-serif leading-relaxed max-w-2xl mx-auto"></p>
    </header>

    <!-- Visuals Area -->
    <section class="max-w-6xl mx-auto px-6 flex flex-col gap-6 lg:gap-12">
        <!-- Hero Image -->
        <div class="w-full">
            <img id="proj-hero" class="w-full h-auto object-cover rounded-sm shadow-sm" src="" alt="Hero Visual">
        </div>
        
        <!-- Gallery Images -->
        <div id="proj-gallery-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-12 hidden">
            <!-- Dynamic secondary visuals -->
        </div>
    </section>

    <!-- Footer Action -->
    <section class="mt-32 border-t border-surface-variant/50 pt-16 flex flex-col items-center">
        <a href="index.html" class="flex items-center gap-2 text-xs uppercase tracking-widest font-bold hover:opacity-70 transition-opacity text-primary">
            Explorar Galería <span class="material-symbols-outlined">arrow_forward</span>
        </a>
    </section>
</main>

<script type="module" src="project.js"></script>
